<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AstroChino — Horóscopo Chino 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #1a0505;
  --card: #2a0a0a;
  --card-hover: #3a0f0f;
  --red: #c62828;
  --red-deep: #6b1010;
  --gold: #d4a017;
  --gold-light: #f0c850;
  --gold-dim: #8a6010;
  --text: #f5e6d3;
  --text-dim: #b09880;
  --border: rgba(212,160,23,0.15);
}

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Dynamic Background ── */
.bg-layer {
  position:fixed; top:0; left:0; right:0; bottom:0; z-index:0; pointer-events:none; overflow:hidden;
}
.bg-layer .gradient {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(180,20,20,0.25) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(212,160,23,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 60%, rgba(180,20,20,0.08) 0%, transparent 50%);
}
.bg-layer .pattern {
  position:absolute; inset:0;
  background-image:
    linear-gradient(45deg, rgba(212,160,23,0.04) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(212,160,23,0.04) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, rgba(212,160,23,0.04) 75%),
    linear-gradient(-45deg, transparent 75%, rgba(212,160,23,0.04) 75%);
  background-size: 60px 60px;
}
/* Floating particles (fire sparks) */
.particle {
  position:absolute; width:4px; height:4px;
  background: var(--gold-light); border-radius:50%;
  opacity:0; animation: floatUp 4s ease-in infinite;
}
.particle:nth-child(1) { left:10%; animation-delay:0s; }
.particle:nth-child(2) { left:25%; animation-delay:1.2s; width:3px; height:3px; }
.particle:nth-child(3) { left:40%; animation-delay:2.5s; }
.particle:nth-child(4) { left:55%; animation-delay:0.8s; width:5px; height:5px; background:var(--red); }
.particle:nth-child(5) { left:70%; animation-delay:3s; }
.particle:nth-child(6) { left:85%; animation-delay:1.8s; width:3px; height:3px; }
.particle:nth-child(7) { left:15%; animation-delay:3.5s; width:5px; height:5px; background:var(--red); }
.particle:nth-child(8) { left:65%; animation-delay:0.5s; }
.particle:nth-child(9) { left:35%; animation-delay:2s; }
.particle:nth-child(10) { left:50%; animation-delay:4s; width:6px; height:6px; background:var(--gold); }

@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0); opacity:0; }
  20% { opacity:0.8; }
  80% { opacity:0.6; }
  100% { transform: translateY(-10vh) scale(1); opacity:0; }
}

/* Floating lanterns */
.lantern {
  position:absolute; width:30px; height:36px;
  opacity:0; animation: lanternSway 5s ease-in-out infinite;
  pointer-events:none;
}
.lantern::before {
  content:''; display:block; width:100%; height:100%;
  background: radial-gradient(ellipse at 50% 60%, var(--red), var(--red-deep));
  border-radius: 50% 50% 40% 40%;
  box-shadow: 0 0 20px rgba(180,20,20,0.3);
}
.lantern::after {
  content:''; display:block; width:2px; height:10px;
  background: var(--gold); margin:0 auto;
}
.lantern:nth-child(11) { left:5%; animation-delay:0s; }
.lantern:nth-child(12) { left:20%; animation-delay:2s; height:30px; width:24px; }
.lantern:nth-child(13) { left:80%; animation-delay:1s; }
.lantern:nth-child(14) { left:92%; animation-delay:3s; height:24px; width:20px; }
.lantern:nth-child(15) { left:45%; animation-delay:4s; height:28px; width:22px; opacity:0.5; }

@keyframes lanternSway {
  0% { transform: translateY(100vh) rotate(-5deg); opacity:0; }
  10% { opacity:0.6; }
  50% { transform: translateY(30vh) rotate(5deg); opacity:0.5; }
  90% { opacity:0.3; }
  100% { transform: translateY(-10vh) rotate(-5deg); opacity:0; }
}

/* ── Content ── */
.content { position:relative; z-index:1; max-width:680px; margin:0 auto; padding:0 12px 120px; }

/* ── Header ── */
.header {
  text-align:center; padding:32px 16px 8px;
  position:relative;
}
.header h1 {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 2.4rem; font-weight: 900;
  letter-spacing: 6px;
  background: linear-gradient(180deg, #f0c850 0%, #d4a017 50%, #b8860b 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 25px rgba(212,160,23,0.3));
  animation: glow 3s ease-in-out infinite;
}
@keyframes glow {
  0%, 100% { filter: drop-shadow(0 0 25px rgba(212,160,23,0.3)); }
  50% { filter: drop-shadow(0 0 45px rgba(212,160,23,0.5)); }
}
.header .cn {
  font-size: 0.85rem; font-weight: 300;
  color: var(--gold); letter-spacing: 8px; margin-top: 4px;
  -webkit-text-fill-color: var(--gold);
}
.header .cn span { color: var(--red); -webkit-text-fill-color: var(--red); }
.header .sub {
  font-size: 0.65rem; color: var(--text-dim); font-weight: 300;
  letter-spacing: 4px; margin-top: 2px;
  -webkit-text-fill-color: var(--text-dim);
}

/* ── Year Banner ── */
.year-strip {
  text-align:center; padding:12px 16px; margin:10px 12px 14px;
  background: linear-gradient(90deg, transparent, rgba(212,160,23,0.08), transparent);
  border-top:1px solid var(--border); border-bottom:1px solid var(--border);
}
.year-strip .big {
  font-size:1.1rem; font-weight:700; color:var(--gold); letter-spacing:2px;
}
.year-strip .small {
  font-size:0.65rem; color:var(--text-dim); letter-spacing:3px; margin-top:2px;
}

/* ── Card ── */
.card {
  background: linear-gradient(145deg, var(--card), rgba(30,8,8,0.8));
  border: 1px solid var(--border);
  padding: 16px; margin-bottom: 12px;
}
.card-title {
  font-size:0.9rem; font-weight:700; color:var(--gold-light);
  margin-bottom:12px; letter-spacing:1px;
}

/* ── Animal Grid (Hero) ── */
.animal-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
}
.animal-card {
  cursor:pointer; overflow:hidden;
  border:1px solid var(--border);
  transition:0.25s; background:var(--card);
}
.animal-card:hover {
  border-color:var(--gold);
  transform:translateY(-3px);
  box-shadow:0 8px 25px rgba(212,160,23,0.1);
}
.animal-card img {
  width:100%; display:block; aspect-ratio:1; object-fit:cover;
}
.animal-card .label {
  padding:6px 8px; text-align:center;
  font-size:0.75rem; font-weight:700; color:var(--gold);
  letter-spacing:1px;
  background: linear-gradient(0deg, rgba(0,0,0,0.3), transparent);
}
.animal-card .sub {
  font-size:0.6rem; color:var(--text-dim); font-weight:300;
  margin-top:-2px;
}

/* ── Modal ── */
.modal-overlay {
  display:none; position:fixed; z-index:100; inset:0;
  background:rgba(0,0,0,0.8); backdrop-filter:blur(4px);
  align-items:center; justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal {
  background: #1a0808; border:1px solid var(--gold);
  max-width:480px; width:92%; max-height:92vh; overflow-y:auto;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity:0; transform:scale(0.95); }
  to { opacity:1; transform:scale(1); }
}
.modal-close {
  position:sticky; top:8px; float:right; margin:8px 12px 0 0;
  background: rgba(0,0,0,0.5); border:1px solid var(--border);
  color:var(--text-dim); width:32px; height:32px;
  font-size:1rem; cursor:pointer; z-index:2;
  font-family:'Noto Sans SC', sans-serif;
}
.modal-img {
  width:100%; aspect-ratio:1; object-fit:cover;
}
.modal-body { padding:16px 20px 20px; }
.modal-body h2 {
  font-size:1.3rem; font-weight:700; color:var(--gold);
  letter-spacing:2px; margin-bottom:4px;
}
.modal-body .meta { font-size:0.72rem; color:var(--text-dim); margin-bottom:12px; }
.modal-section { margin-bottom:14px; }
.modal-section h3 {
  font-size:0.72rem; font-weight:400; color:var(--gold);
  letter-spacing:2px; text-transform:uppercase;
  border-bottom:1px solid var(--border); padding-bottom:3px; margin-bottom:6px;
}
.modal-section p { font-size:0.82rem; line-height:1.7; }
.modal-section .tags { display:flex; flex-wrap:wrap; gap:4px; }
.modal-section .tag {
  padding:2px 10px; background:rgba(212,160,23,0.08);
  border:1px solid rgba(212,160,23,0.15);
  font-size:0.7rem; color:var(--gold-light);
}
.modal-years { display:flex; flex-wrap:wrap; gap:4px; }
.modal-years .y {
  padding:2px 10px; background:rgba(0,0,0,0.3);
  border:1px solid var(--border);
  font-size:0.72rem; color:var(--text);
}

/* ── Horoscope List ── */
.horo-item {
  display:flex; align-items:center; gap:10px; padding:10px;
  border:1px solid var(--border); margin-bottom:6px;
  cursor:pointer; transition:0.2s;
}
.horo-item:hover { border-color:var(--gold); background:var(--card-hover); }
.horo-item img { width:44px; height:44px; object-fit:cover; flex-shrink:0; }
.horo-item .info { flex:1; min-width:0; }
.horo-item .info .name { font-weight:700; font-size:0.8rem; color:var(--gold); }
.horo-item .info .prev { font-size:0.7rem; color:var(--text-dim); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.horo-item .arr { color:var(--gold); opacity:0.4; font-size:1.2rem; }
.horo-exp {
  padding:14px; margin-top:-2px; margin-bottom:6px;
  border:1px solid var(--gold); background:var(--card);
  animation: fadeIn 0.2s ease;
}
.horo-exp .top { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.horo-exp .top img { width:40px; height:40px; object-fit:cover; }
.horo-exp .top .name { font-weight:700; font-size:0.85rem; color:var(--gold); }
.horo-exp .top .date { font-size:0.65rem; color:var(--text-dim); }
.horo-exp .text { font-size:0.8rem; line-height:1.7; white-space:pre-wrap; }
.horo-exp .lucky { font-size:0.7rem; color:var(--gold); margin-top:8px; padding-top:6px; border-top:1px solid var(--border); }

/* ── Period Tabs ── */
.period-tabs { display:flex; gap:4px; margin-bottom:12px; overflow-x:auto; }
.period-tabs button {
  padding:6px 14px; border:1px solid var(--border);
  background: rgba(0,0,0,0.3); color:var(--text-dim);
  cursor:pointer; font-size:0.68rem; font-family:'Noto Sans SC', sans-serif;
  white-space:nowrap; transition:0.2s;
}
.period-tabs button.active { border-color:var(--gold); color:var(--gold); background:rgba(212,160,23,0.08); }
.period-tabs button:hover { border-color:var(--gold); color:var(--gold); }

/* ── Calc ── */
.calc-row { display:flex; gap:6px; }
.calc-row select { flex:1; min-width:0; }

/* ── Form Elements ── */
select, input {
  padding:9px 10px; border:1px solid var(--border);
  background: rgba(0,0,0,0.3); color:var(--text);
  font-family:'Noto Sans SC', sans-serif; font-size:0.78rem;
}
select:focus, input:focus { outline:none; border-color:var(--gold); }

/* ── Buttons ── */
.btn {
  display:inline-block; padding:10px 24px; border:none; cursor:pointer;
  font-family:'Noto Sans SC', sans-serif; font-size:0.75rem; font-weight:700;
  letter-spacing:1px;
  background: linear-gradient(180deg, var(--red), var(--red-deep));
  color: var(--gold-light); transition:0.2s;
}
.btn:hover { filter:brightness(1.15); }
.btn-full { width:100%; margin-top:8px; }
.btn-sm { padding:7px 18px; font-size:0.7rem; }
.btn-gold {
  background: linear-gradient(180deg, var(--gold), #a67c00);
  color: #1a0505;
}
.btn-outline { background:transparent; border:1px solid var(--gold); color:var(--gold); }

/* ── Compat ── */
.comp-disp { text-align:center; padding:10px 0; }
.comp-disp .pair { display:flex; align-items:center; justify-content:center; gap:12px; margin:8px 0; }
.comp-disp .pair img { width:48px; height:48px; object-fit:cover; }
.comp-disp .pair .name { font-size:0.85rem; color:var(--gold); font-weight:700; }
.comp-disp .pair .heart { color:var(--red); font-size:1.3rem; }
.comp-bar { height:5px; background:rgba(255,255,255,0.05); overflow:hidden; margin:8px 0; }
.comp-bar-fill { height:100%; transition:width 0.5s; }
.comp-level { font-size:1rem; font-weight:700; text-align:center; }
.comp-desc { font-size:0.78rem; color:var(--text-dim); text-align:center; margin-top:6px; }

/* ── Calc Result ── */
.calc-res {
  text-align:center; padding:12px; margin-top:8px;
  border:1px solid var(--border);
}
.calc-res img { width:64px; height:64px; object-fit:cover; margin-bottom:4px; }
.calc-res h3 { font-size:1rem; color:var(--gold); }
.calc-res p { font-size:0.75rem; color:var(--text-dim); margin-top:4px; }

/* ── Auth ── */
.auth-msg { margin-top:6px; padding:6px; font-size:0.72rem; display:none; }
.auth-msg.error { display:block; background:rgba(180,30,30,0.15); border-left:2px solid var(--red); color:#ff6b6b; }
.auth-msg.success { display:block; background:rgba(76,175,80,0.1); border-left:2px solid #4caf50; color:#69f0ae; }
.profile-badge {
  display:inline-block; background:linear-gradient(135deg,var(--gold),#a67c00);
  color:#1a0505; padding:2px 12px; font-size:0.65rem; font-weight:700;
}

/* ── Nav ── */
.nav {
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  display:flex; justify-content:space-around;
  background: linear-gradient(180deg, rgba(26,5,5,0.97), rgba(26,5,5,1));
  border-top:1px solid var(--border);
  padding:6px 0 14px; max-width:680px; margin:0 auto;
}
.nav button {
  background:none; border:none; color:var(--text-dim);
  font-size:0.6rem; cursor:pointer;
  display:flex; flex-direction:column; align-items:center;
  gap:2px; padding:4px 14px;
  font-family:'Noto Sans SC', sans-serif; letter-spacing:0.5px;
  transition:0.2s;
}
.nav button.active { color:var(--gold); }
.nav button i { font-size:1.1rem; filter:brightness(0.6); }
.nav button.active i { filter:brightness(1); }

/* ── Section Tabs ── */
.section { display:none; }
.section.active { display:block; }

/* ── Footer ── */
.footer { text-align:center; padding:20px 0; font-size:0.6rem; color:var(--text-dim); opacity:0.4; letter-spacing:2px; }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--red); }
</style>

</head>

<div class="bg-layer">
  <div class="gradient"></div>
  <div class="pattern"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>

<div class="content">

<script>
const API = '';
let token = localStorage.getItem('token');
let currentPeriod = 'today';

const ANIMALS = ['Rata','Buey','Tigre','Conejo','Drag\u00f3n','Serpiente','Caballo','Cabra','Mono','Gallo','Perro','Cerdo'];
const ANIMAL_IMGS = [
  '/static/images/Rata.jpg','/static/images/Buey.jpg','/static/images/Tigre.jpg',
  '/static/images/Conejo.jpg','/static/images/Drag\u00f3n.jpg','/static/images/Serpiente.jpg',
  '/static/images/Caballo.jpg','/static/images/Cabra.jpg','/static/images/Mono.jpg',
  '/static/images/Gallo.jpg','/static/images/Perro.jpg','/static/images/Cerdo.jpg'
];

const YEARS = ANIMALS.map((_, i) => {
  const y = [];
  for (let yr = 2026; yr >= 1900; yr -= 12) y.push(yr);
  for (let yr = 2026+12; yr <= 2040; yr += 12) y.push(yr);
  return y.sort((a,b)=>b-a);
});

const STONES = {
  'Rata':['Amatista','Ojo de tigre','Cuarzo rosa'],
  'Buey':['Jade','Onix','Agata'],
  'Tigre':['Ojo de halcon','Citrino','Granate'],
  'Conejo':['Jade blanco','Cuarzo rosa','Perla'],
  'Drag\u00f3n':['Jade verde','Opalo','Rubi'],
  'Serpiente':['Ojo de gato','Malaquita','Turquesa'],
  'Caballo':['Granate','Cornalina','Ojo de tigre'],
  'Cabra':['Cuarzo rosa','Jade','Amatista'],
  'Mono':['Obsidiana','Lapislazuli','Citrino'],
  'Gallo':['Topacio','Ambar','Ojo de halcon'],
  'Perro':['Zafiro','Onix','Jade'],
  'Cerdo':['Rubi','Turmalina','Cuarzo']
};
const COMPAT_BRIEF = {
  'Rata':'Excelente con Drag\u00f3n y Mono. Desafiante con Caballo.',
  'Buey':'Excelente con Serpiente y Gallo. Desafiante con Cabra.',
  'Tigre':'Excelente con Caballo y Perro. Desafiante con Mono.',
  'Conejo':'Excelente con Cerdo y Cabra. Desafiante con Gallo.',
  'Drag\u00f3n':'Excelente con Rata y Mono. Desafiante con Perro.',
  'Serpiente':'Excelente con Gallo y Buey. Desafiante con Cerdo.',
  'Caballo':'Excelente con Tigre y Perro. Desafiante con Rata.',
  'Cabra':'Excelente con Cerdo y Conejo. Desafiante con Buey.',
  'Mono':'Excelente con Rata y Drag\u00f3n. Desafiante con Tigre.',
  'Gallo':'Excelente con Buey y Serpiente. Desafiante con Conejo.',
  'Perro':'Excelente con Tigre y Caballo. Desafiante con Drag\u00f3n.',
  'Cerdo':'Excelente con Conejo y Cabra. Desafiante con Serpiente.'
};

async function api(path, opts={}) {
  const headers = {'Content-Type':'application/json'};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const r = await fetch(API + path, {...opts, headers});
  if (!r.ok) { const err = await r.json().catch(()=>({detail:r.statusText})); throw new Error(err.detail||'Error'); }
  return r.json();
}

function showTab(tab) {
  document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab === 'signos') loadSignosGrid();
  if (tab === 'cuenta' && token) fetchProfile();
}
document.querySelectorAll('.nav button').forEach(b => b.addEventListener('click', ()=>showTab(b.dataset.tab)));
function toggleAuth(l) { document.getElementById('registerForm').style.display=l?'none':'block'; document.getElementById('loginForm').style.display=l?'block':'none'; }

// Year Info
fetch('/api/year-info').then(r=>r.json()).then(d=>{
  const i=d.info;
  document.getElementById('yearStrip').innerHTML = `<div class="big">${i.animal} de ${i.element} · ${i.name_cn} · Año ${i.chinese_year}</div><div class="small">${i.start_date} — ${i.end_date}</div>`;
}).catch(()=>{});

// Animals Grid (Home)
function renderGrid(container, clickHandler) {
  const d = ANIMALS;
  container.innerHTML = d.map((a,i) =>
    `<div class="animal-card" onclick="${clickHandler}(${i})">
      <img src="${ANIMAL_IMGS[i]}" alt="${ANIMALS[i]}" loading="lazy">
      <div class="label">${ANIMALS[i]}<div class="sub"></div></div>
    </div>`
  ).join('');
}
renderGrid(document.getElementById('animalGrid'), 'openModal');
function loadSignosGrid() {
  fetch('/api/animals').then(r=>r.json()).then(d=>{
    document.getElementById('signosGrid').innerHTML = d.animals.map((a,i) =>
      `<div class="animal-card" onclick="openModal(${i})">
        <img src="${ANIMAL_IMGS[i]}" alt="${a.name}" loading="lazy">
        <div class="label">${a.name}<div class="sub">${a.element} · ${a.polarity}</div></div>
      </div>`
    ).join('');
  }).catch(()=>{});
}

// Modal
async function openModal(idx) {
  const name = ANIMALS[idx];
  const modal = document.getElementById('animalModal');
  modal.classList.add('show');
  document.getElementById('modalImg').src = ANIMAL_IMGS[idx];
  document.getElementById('modalName').textContent = ANIMALS[idx];
  document.getElementById('modalMeta').textContent = '';
  document.getElementById('modalPersonality').textContent = 'Cargando...';
  document.getElementById('modalElement').innerHTML = '';
  document.getElementById('modalLucky').textContent = '';
  document.getElementById('modalCompat').textContent = '';
  document.getElementById('modalYears').innerHTML = YEARS[idx].slice(0,12).map(y => `<span class="y">${y}</span>`).join('');
  try {
    const d = await api('/api/animal/'+name);
    document.getElementById('modalMeta').textContent = `${d.animal.element} · ${d.animal.polarity} · ${d.animal.branch} · ${d.animal.seasons}`;
    document.getElementById('modalPersonality').textContent = d.personality;
    document.getElementById('modalElement').innerHTML = d.animal.element+` · `+d.animal.polarity+` · `+d.animal.branch+` · `+d.animal.hours+` · `+d.animal.seasons;
    document.getElementById('modalLucky').innerHTML = `Numeros: ${d.lucky?.numeros?.join(', ')}<br>Colores: ${d.lucky?.colores?.join(', ')}<br>Direccion: ${d.lucky?.direccion||'-'}<br>Piedras: ${STONES[name]?.join(', ')||'-'}`;
    document.getElementById('modalCompat').textContent = COMPAT_BRIEF[name]||'';
  } catch(e) { document.getElementById('modalPersonality').textContent = 'Informacion no disponible'; }
}
function closeModal() { document.getElementById('animalModal').classList.remove('show'); }
document.getElementById('animalModal').addEventListener('click', function(e) { if(e.target===this) closeModal(); });

// Horoscope
async function loadHoroscopes(period) {
  currentPeriod = period;
  document.querySelectorAll('.period-tabs button').forEach(b => b.classList.toggle('active', b.dataset.period===period));
  const el = document.getElementById('horoList');
  try {
    const d = await api('/api/animals');
    el.innerHTML = d.animals.map((a,i) =>
      `<div class="horo-item" onclick="showHoro('${a.name}','${period}')">
        <img src="${ANIMAL_IMGS[i]}" alt="${a.name}" loading="lazy">
        <div class="info"><div class="name">${a.name}</div><div class="prev">Cargando...</div></div>
        <div class="arr">></div>
      </div>`
    ).join('');
    d.animals.forEach(async (a,i) => {
      try {
        const h = await api('/api/horoscope/'+a.name+'?period='+period);
        const card = el.children[i];
        if (card) card.querySelector('.prev').textContent = h.horoscope.slice(0,80)+'...';
      } catch(e) {}
    });
  } catch(e) { el.innerHTML = '<p style="color:var(--text-dim);">Error</p>'; }
}
async function showHoro(name, period) {
  try {
    const h = await api('/api/horoscope/'+name+'?period='+period);
    const idx = ANIMALS.indexOf(name);
    const list = document.getElementById('horoList');
    const old = list.querySelector('.horo-exp');
    if (old) old.remove();
    const d = document.createElement('div');
    d.className = 'horo-exp';
    d.innerHTML = `<div class="top"><img src="${ANIMAL_IMGS[idx]}"><div><div class="name">${h.animal}</div><div class="date">${h.date}</div></div></div><div class="text">${h.horoscope}</div><div class="lucky">Numeros: ${h.lucky?.numeros?.join(', ')} · Colores: ${h.lucky?.colores?.join(', ')}</div>`;
    const card = list.children[idx];
    if (card) card.after(d);
    d.scrollIntoView({behavior:'smooth', block:'center'});
  } catch(e) {}
}

// Calc Sign
async function calcSign() {
  const y=parseInt(document.getElementById('calcYear').value), m=parseInt(document.getElementById('calcMonth').value), d=parseInt(document.getElementById('calcDay').value);
  const el = document.getElementById('calcResult');
  try {
    const r = await api('/api/calculate?year='+y+'&month='+m+'&day='+d);
    el.innerHTML = `<div class="calc-res"><img src="${ANIMAL_IMGS[r.animal.id]}"><h3>${r.animal.name}</h3><p>${r.element} · ${r.animal.polarity}</p></div>`;
  } catch(e) { el.innerHTML = '<p style="color:var(--red);font-size:0.75rem;margin-top:6px;">Error</p>'; }
}

// Compat
async function checkCompat() {
  const a1=document.getElementById('comp1').value, a2=document.getElementById('comp2').value, el=document.getElementById('compResult');
  if (!a1||!a2) { el.innerHTML='<p style="color:var(--text-dim);margin-top:6px;">Selecciona dos animales</p>'; return; }
  try {
    const r = await api('/api/compatibility?animal1='+a1+'&animal2='+a2);
    const c=r.compatibility;
    const cs={Excelente:'var(--gold)',Buena:'#4caf50',Neutral:'#ff9800',Desafiante:'#e91e63',Conflicto:'var(--red)'};
    const i1=ANIMALS.indexOf(r.animal1.name), i2=ANIMALS.indexOf(r.animal2.name);
    el.innerHTML = `<div class="comp-disp"><div class="pair"><img src="${ANIMAL_IMGS[i1]}"><span class="name">${r.animal1.name}</span><span class="heart">&#9829;</span><span class="name">${r.animal2.name}</span><img src="${ANIMAL_IMGS[i2]}"></div><div class="comp-bar"><div class="comp-bar-fill" style="width:${c.score}%;background:${cs[c.level]||'#888'};"></div></div><div class="comp-level" style="color:${cs[c.level]||'#888'};">${c.level} (${c.score}%)</div><div class="comp-desc">${c.desc}</div></div>`;
  } catch(e) { el.innerHTML = '<p style="color:var(--red);">Error</p>'; }
}

// Auth
async function register() {
  const e=document.getElementById('regEmail').value, p=document.getElementById('regPass').value, n=document.getElementById('regName').value;
  const y=parseInt(document.getElementById('regYear').value), m=parseInt(document.getElementById('regMonth').value), d=parseInt(document.getElementById('regDay').value);
  const msg=document.getElementById('regMsg');
  if (!e||!p||!n) { msg.textContent='Completa todos los campos'; msg.className='auth-msg error'; return; }
  try {
    const r = await api('/api/register', {method:'POST', body:JSON.stringify({email:e,password:p,nombre:n,birth_year:y,birth_month:m,birth_day:d})});
    token=r.token; localStorage.setItem('token',token);
    msg.innerHTML='Registrado! Tu animal es '+r.animal; msg.className='auth-msg success';
    setTimeout(fetchProfile,1200);
  } catch(e) { msg.textContent=e.message; msg.className='auth-msg error'; }
}
async function login() {
  const e=document.getElementById('loginEmail').value, p=document.getElementById('loginPass').value, msg=document.getElementById('loginMsg');
  if (!e||!p) { msg.textContent='Completa los campos'; msg.className='auth-msg error'; return; }
  try {
    const r = await api('/api/login', {method:'POST', body:JSON.stringify({email:e,password:p,nombre:'',birth_year:2000})});
    token=r.token; localStorage.setItem('token',token);
    msg.innerHTML='Bienvenido!'; msg.className='auth-msg success';
    setTimeout(fetchProfile,1000);
  } catch(e) { msg.textContent=e.message; msg.className='auth-msg error'; }
}
async function fetchProfile() {
  if (!token) return;
  try {
    const d = await api('/api/profile');
    document.getElementById('authSection').style.display='none';
    document.getElementById('profileSection').style.display='block';
    const idx = ANIMALS.indexOf(d.user.animal.toLowerCase());
    document.getElementById('profImg').src = idx>=0?ANIMAL_IMGS[idx]:ANIMAL_IMGS[4];
    document.getElementById('profName').textContent = d.user.nombre||d.user.email;
    document.getElementById('profSub').textContent = (d.user.signo||d.user.animal)+' · Anho '+d.user.birth_year;
    if (d.user.premium) {
      document.getElementById('profPremium').innerHTML='<span class="profile-badge">PREMIUM</span>';
      document.getElementById('premiumSection').innerHTML='';
    } else {
      document.getElementById('profPremium').innerHTML='<span style="font-size:0.72rem;color:var(--text-dim);">Gratuito</span>';
      document.getElementById('premiumSection').innerHTML='<button class="btn btn-sm btn-gold" onclick="alert(\'Proximamente\')" style="margin-top:6px;">Premium $2/mes</button>';
    }
  } catch(e) { logout(); }
}
function logout() { token=null; localStorage.removeItem('token'); document.getElementById('authSection').style.display='block'; document.getElementById('profileSection').style.display='none'; }

// Init
(function() {
  const days = Array.from({length:31},(_,i)=>'<option value="'+(i+1)+'">'+(i+1)+'</option>').join('');
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'].map((m,i)=>'<option value="'+(i+1)+'">'+m+'</option>').join('');
  const years = Array.from({length:100},(_,i)=>'<option value="'+(2026-i)+'">'+(2026-i)+'</option>').join('');
  ['calcDay','regDay'].forEach(id => document.getElementById(id).innerHTML = days);
  ['calcMonth','regMonth'].forEach(id => document.getElementById(id).innerHTML = months);
  ['calcYear','regYear'].forEach(id => document.getElementById(id).innerHTML = years);
  ['comp1','comp2'].forEach(id => {
    document.getElementById(id).innerHTML = '<option value="">Elegi</option>'+ANIMALS.map((a,i)=>'<option value="'+a+'">'+ANIMALS[i]+'</option>').join('');
  });
  document.getElementById('periodNav').innerHTML =
    [{k:'today',l:'Hoy'},{k:'tomorrow',l:'Ma\u00f1ana'},{k:'weekly',l:'Semanal'},{k:'monthly',l:'Mensual'},{k:'yearly',l:'Anual'}]
    .map(p => '<button data-period="'+p.k+'" class="'+(p.k==='today'?'active':'')+'" onclick="loadHoroscopes(\''+p.k+'\')">'+p.l+'</button>').join('');
  loadHoroscopes('today');
  if (token) fetchProfile();
})();
</script>
